<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Конвертер валют</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="converter-card">
        <h1>Конвертер валют</h1>
        <p class="subtitle">Конвертация Руб.</p>
        <div class="input-group">
          <label for="amount">Сумма (Руб.):</label>
          <input type="number" id="amount" placeholder="Введите сумму в рублях" step="1" />
        </div>
        <div class="input-group">
          <label for="currency">Выберите валюту:</label>
          <select id="currency">
            <option value="USD">Доллар (USD)</option>
            <option value="EUR">Евро (EUR)</option>
            <option value="GBP">Фунт стерлингов (GBP)</option>
            <option value="CNY">Китайский юань (CNY)</option>
            <option value="KZT">Казахстанский тенге (KZT)</option>
          </select>
        </div>
        <button id="convertBtn" class="convert-btn">Конвертировать</button>
        <div class="result" id="result"></div>
        <div class="error" id="error"></div>
      </div>
    </div>
    <script type="module" src="main1.js"></script>
  </body>
</html>
